<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - EventHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">EventHub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse show" id="navMenu">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container flex-grow-1 d-flex justify-content-center align-items-center py-5">
        <div class="col-md-8 col-lg-6 glass-form">
            <h2 class="text-center fw-bold mb-4">Contact Us</h2>
            <p class="text-center text-muted mb-4">Have questions? Send us a message and we'll get back to you shortly.</p>
            <div id="contactAlert" class="alert d-none"></div>
            <form id="contactForm">
                <div class="mb-3">
                    <label class="form-label fw-bold">Name</label>
                    <input type="text" class="form-control" id="contactName" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Email</label>
                    <input type="email" class="form-control" id="contactEmail" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Message</label>
                    <textarea class="form-control" id="contactMessage" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill fw-bold" id="submitContactBtn">Send Message</button>
            </form>
        </div>
    </div>

    <!-- JS -->
    <script src="js/api.js"></script>
    <script>
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitContactBtn');
            const alertBox = document.getElementById('contactAlert');
            
            const name = document.getElementById('contactName').value;
            const email = document.getElementById('contactEmail').value;
            const message = document.getElementById('contactMessage').value;

            btn.disabled = true;
            btn.innerText = 'Sending...';

            try {
                await fetchAPI('/contact', 'POST', { name, email, message });
                alertBox.className = 'alert alert-success mt-3';
                alertBox.innerText = 'Message sent! We will get back to you soon.';
                alertBox.classList.remove('d-none');
                document.getElementById('contactForm').reset();
            } catch (err) {
                alertBox.className = 'alert alert-danger mt-3';
                alertBox.innerText = err.message || 'Failed to send message.';
                alertBox.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Send Message';
            }
        });
    </script>
</body>
</html>
