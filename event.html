<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details - EventHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .event-hero {
            height: 400px;
            background-color: #e9ecef;
            background-size: cover;
            background-position: center;
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            margin-top: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .event-hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.1) 100%);
        }
        .event-hero-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 50px;
            z-index: 2;
            color: white;
        }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="index.html">
                <i class="bi bi-lightning-charge-fill text-warning"></i> EventHub
            </a>
            <div class="collapse navbar-collapse show" id="navMenu">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item"><a class="nav-link px-3 fw-bold" href="events.html"><i class="bi bi-arrow-left me-1"></i> Back to Events</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5 flex-grow-1">
        <div class="event-hero mb-5" id="eventHero">
            <div class="event-hero-content">
                <span class="badge bg-primary px-3 py-2 rounded-pill mb-3 fw-bold text-uppercase shadow-sm"><i class="bi bi-star-fill text-warning me-1"></i> Premium Event</span>
                <h1 class="display-4 fw-bold mb-3" id="evTitle" style="letter-spacing: -1px;">Loading...</h1>
                <p class="lead mb-0 text-white-50 fw-bold" id="evDateLocation">
                    <i class="bi bi-calendar"></i> ... &nbsp;&nbsp;&nbsp; <i class="bi bi-geo-alt"></i> ...
                </p>
            </div>
        </div>

        <div class="row g-5">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm p-5 h-100" style="border-radius: 20px;">
                    <h3 class="fw-bold mb-4">About this Event</h3>
                    <p id="evDescription" class="mb-0 text-muted" style="white-space: pre-wrap; font-size: 1.15rem; line-height: 1.8;">Loading...</p>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="countdown-box mb-4">
                    <div class="small text-dark text-uppercase fw-bold mb-2 tracking-wide">Event starts in</div>
                    <span id="countdown" class="fw-bold">--:--:--:--</span>
                </div>

                <div class="card border-0 shadow-sm p-4 text-center mb-4" style="border-radius: 20px;">
                    <h4 class="fw-bold mb-3">Secure Your Spot</h4>
                    <p class="text-muted small mb-4">Tickets are selling fast. Book now to guarantee your entry.</p>
                    <button class="btn btn-primary btn-lg rounded-pill fw-bold w-100 shadow-sm" id="btnRegister" onclick="goToPayment()">
                        <i class="bi bi-ticket-perforated me-2"></i> Get Tickets
                    </button>
                    <div id="regMsg" class="mt-3 small fw-bold"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="js/api.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('id');
        let eventDateGlobal = null;

        const techImages = [
            '1540575467063-178a50c2df87',
            '1492684223066-81342ee5ff30',
            '1515187029135-18ee286d815b',
            '1505373877841-8d25f7d46678',
            '1551818255-e6e10975bc17',
            '1504384308090-c894fdcc538d'
        ];

        document.addEventListener('DOMContentLoaded', async () => {
            if (!eventId) {
                document.getElementById('evTitle').innerText = 'Event Not Found';
                return;
            }

            try {
                const ev = await fetchAPI(`/events/${eventId}`);
                document.getElementById('evTitle').innerText = ev.title;
                const d = new Date(ev.event_date);
                eventDateGlobal = d;
                
                document.getElementById('evDateLocation').innerHTML = `<i class="bi bi-calendar text-warning me-2"></i> ${d.toLocaleString()} &nbsp;&nbsp;&nbsp;&nbsp; <i class="bi bi-geo-alt text-danger me-2"></i> ${ev.location}`;
                document.getElementById('evDescription').innerText = ev.description;
                
                // Set Hero Image based on ID dynamically
                const imgHash = techImages[(eventId - 1) % techImages.length] || techImages[0];
                document.getElementById('eventHero').style.backgroundImage = `url('https://images.unsplash.com/photo-${imgHash}?w=1600&q=80')`;
                
                startCountdown();
            } catch (err) {
                document.getElementById('evTitle').innerText = 'Event Not Found';
                document.getElementById('evDescription').innerText = 'The requested event does not exist.';
            }
        });

        function startCountdown() {
            setInterval(() => {
                const now = new Date().getTime();
                const distance = eventDateGlobal.getTime() - now;

                if (distance < 0) {
                    document.getElementById('countdown').innerHTML = "EVENT STARTED";
                    document.getElementById('countdown').classList.replace('text-danger', 'text-success');
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById('countdown').innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
            }, 1000);
        }

        function goToPayment() {
            if (!localStorage.getItem('token')) {
                window.location.href = 'login.html';
            } else {
                window.location.href = `payment.html?event_id=${eventId}`;
            }
        }
    </script>
</body>
</html>
