<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment - EventHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">EventHub</a>
        </div>
    </nav>

    <div class="container flex-grow-1 d-flex justify-content-center align-items-center py-5">
        <div class="col-md-6 col-lg-5 glass-form">
            <h3 class="fw-bold text-center mb-4">Complete Your Booking</h3>
            <p class="text-center text-muted small mb-4">This is a dummy payment page.</p>
            
            <form id="paymentForm">
                <div class="mb-3">
                    <label class="form-label fw-bold small">Cardholder Name</label>
                    <input type="text" class="form-control" required placeholder="John Doe">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold small">Card Number</label>
                    <input type="text" class="form-control" required placeholder="1234 5678 9101 1121" pattern="[0-9]{16}">
                </div>
                <div class="row mb-4">
                    <div class="col-6">
                        <label class="form-label fw-bold small">Expiry (MM/YY)</label>
                        <input type="text" class="form-control" required placeholder="12/25">
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-bold small">CVV</label>
                        <input type="text" class="form-control" required placeholder="123" pattern="[0-9]{3}">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill fw-bold" id="payBtn">Pay & Register</button>
            </form>
            <div id="statusMsg" class="mt-3 text-center d-none"></div>
        </div>
    </div>

    <!-- JS -->
    <script src="js/api.js"></script>
    <script>
        checkAuth();
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('event_id');

        document.getElementById('paymentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payBtn = document.getElementById('payBtn');
            const statusMsg = document.getElementById('statusMsg');
            
            payBtn.disabled = true;
            payBtn.innerText = 'Processing...';

            setTimeout(async () => {
                try {
                    await fetchAPI('/registrations', 'POST', { event_id: eventId });
                    statusMsg.className = 'alert alert-success mt-3 text-center';
                    statusMsg.innerText = 'Payment Successful! Redirecting to your dashboard...';
                    statusMsg.classList.remove('d-none');
                    setTimeout(() => window.location.href = 'dashboard.html', 1500);
                } catch (err) {
                    statusMsg.className = 'alert alert-danger mt-3 text-center';
                    statusMsg.innerText = err.message || 'Payment Failed or Already Registered';
                    statusMsg.classList.remove('d-none');
                    payBtn.disabled = false;
                    payBtn.innerText = 'Pay & Register';
                }
            }, 1000); // Simulate network delay
        });
    </script>
</body>
</html>
