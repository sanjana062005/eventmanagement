<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - EventHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">EventHub Admin</a>
            <div class="collapse navbar-collapse show" id="navMenu">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><button class="btn btn-outline-light ms-2 px-3 rounded-pill" onclick="logout()">Logout</button></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5 flex-grow-1">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">Event Management</h2>
            <button class="btn btn-primary fw-bold rounded-pill" data-bs-toggle="modal" data-bs-target="#eventModal" onclick="resetForm()">
                <i class="bi bi-plus-lg"></i> Create Event
            </button>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th>Title</th>
                            <th>Date</th>
                            <th>Location</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="eventsTableBody">
                        <tr><td colspan="4" class="text-center py-4"><div class="spinner-border text-primary spinner-border-sm"></div> Loading events...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- Registrations Section -->
        <h3 class="fw-bold mt-5 mb-3">View Registrations</h3>
        <div class="row mb-4">
            <div class="col-md-6">
                <select id="eventSelect" class="form-select" onchange="loadRegistrations()">
                    <option value="">Select an Event...</option>
                </select>
            </div>
        </div>
        <div class="card border-0 shadow-sm">
            <div class="table-responsive">
                <table class="table table-striped align-middle mb-0">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Registered At</th>
                        </tr>
                    </thead>
                    <tbody id="registrationsTableBody">
                        <tr><td colspan="3" class="text-center py-3 text-muted">Select an event to view registrations</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Create/Edit Event Modal -->
    <div class="modal fade" id="eventModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-light">
                    <h5 class="modal-title fw-bold" id="modalTitle">Create Event</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="eventForm">
                        <input type="hidden" id="eventId">
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Event Title</label>
                            <input type="text" class="form-control" id="title" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Description</label>
                            <textarea class="form-control" id="description" rows="3" required></textarea>
                        </div>
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label fw-bold small">Date & Time</label>
                                <input type="datetime-local" class="form-control" id="eventDate" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-bold small">Location</label>
                                <input type="text" class="form-control" id="location" required>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer bg-light border-0">
                    <button type="button" class="btn btn-secondary rounded-pill fw-bold" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary rounded-pill fw-bold" onclick="saveEvent()">Save Event</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        checkAuth();
        const user = JSON.parse(localStorage.getItem('user'));
        if (user.role !== 'admin') {
            window.location.href = 'index.html';
        }

        let eventModal;
        let allEvents = [];

        document.addEventListener('DOMContentLoaded', () => {
            eventModal = new bootstrap.Modal(document.getElementById('eventModal'));
            loadEvents();
        });

        async function loadEvents() {
            const tbody = document.getElementById('eventsTableBody');
            const select = document.getElementById('eventSelect');
            try {
                const events = await fetchAPI('/events');
                allEvents = events;
                
                if (events.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">No events found. Create one above!</td></tr>';
                    select.innerHTML = '<option value="">Select an Event...</option>';
                    return;
                }

                let html = '';
                let selectHtml = '<option value="">Select an Event...</option>';
                
                events.forEach(event => {
                    const date = new Date(event.event_date).toLocaleString();
                    html += `
                        <tr>
                            <td class="fw-bold">${event.title}</td>
                            <td>${date}</td>
                            <td>${event.location}</td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-outline-secondary me-1" onclick="editEvent(${event.id})"><i class="bi bi-pencil"></i></button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteEvent(${event.id})"><i class="bi bi-trash"></i></button>
                            </td>
                        </tr>
                    `;
                    selectHtml += `<option value="${event.id}">${event.title}</option>`;
                });
                tbody.innerHTML = html;
                select.innerHTML = selectHtml;
                
                // Clear registrations if current selection stays
                loadRegistrations();
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-danger py-4">Failed to load events.</td></tr>';
            }
        }

        function resetForm() {
            document.getElementById('eventId').value = '';
            document.getElementById('title').value = '';
            document.getElementById('description').value = '';
            document.getElementById('eventDate').value = '';
            document.getElementById('location').value = '';
            document.getElementById('modalTitle').innerText = 'Create Event';
        }

        function editEvent(id) {
            const ev = allEvents.find(e => e.id === id);
            if (!ev) return;
            
            document.getElementById('eventId').value = ev.id;
            document.getElementById('title').value = ev.title;
            document.getElementById('description').value = ev.description;
            
            // Format datetime-local requires YYYY-MM-DDThh:mm
            const dStr = new Date(ev.event_date).toISOString().slice(0,16);
            document.getElementById('eventDate').value = dStr;
            document.getElementById('location').value = ev.location;
            
            document.getElementById('modalTitle').innerText = 'Edit Event';
            eventModal.show();
        }

        async function saveEvent() {
            const id = document.getElementById('eventId').value;
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const event_date = document.getElementById('eventDate').value;
            const location = document.getElementById('location').value;

            if(!title || !description || !event_date || !location) {
                alert("All fields are required");
                return;
            }

            const body = { title, description, event_date, location };

            try {
                if (id) {
                    await fetchAPI(`/events/${id}`, 'PUT', body);
                } else {
                    await fetchAPI('/events', 'POST', body);
                }
                eventModal.hide();
                loadEvents();
            } catch (err) {
                alert(err.message);
            }
        }

        async function deleteEvent(id) {
            if (confirm('Are you sure you want to delete this event? This will also remove all registrations for it.')) {
                try {
                    await fetchAPI(`/events/${id}`, 'DELETE');
                    loadEvents();
                } catch (err) {
                    alert(err.message);
                }
            }
        }

        async function loadRegistrations() {
            const evId = document.getElementById('eventSelect').value;
            const tbody = document.getElementById('registrationsTableBody');
            
            if (!evId) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center py-3 text-muted">Select an event to view registrations</td></tr>';
                return;
            }

            try {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center py-3"><div class="spinner-border spinner-border-sm"></div></td></tr>';
                const regs = await fetchAPI(`/registrations/event/${evId}`);
                
                if (regs.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="text-center py-3 text-muted">No registrations yet.</td></tr>';
                    return;
                }

                let html = '';
                regs.forEach(r => {
                    const date = new Date(r.registered_at).toLocaleString();
                    html += `
                        <tr>
                            <td class="fw-bold">${r.name}</td>
                            <td>${r.email}</td>
                            <td>${date}</td>
                        </tr>
                    `;
                });
                tbody.innerHTML = html;
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center py-3 text-danger">Failed to load registrations.</td></tr>';
            }
        }
    </script>
</body>
</html>
