<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EventHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">EventHub</a>
        </div>
    </nav>

    <div class="container flex-grow-1 d-flex justify-content-center align-items-center py-5">
        <div class="col-md-6 col-lg-5 glass-form">
            <h2 class="text-center fw-bold mb-4">Create an Account</h2>
            <div id="errorAlert" class="alert d-none"></div>
            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label fw-bold">Full Name</label>
                    <input type="text" class="form-control px-3 py-2" id="name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Email address</label>
                    <input type="email" class="form-control px-3 py-2" id="email" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Password</label>
                    <input type="password" class="form-control px-3 py-2" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill fw-bold">Register</button>
            </form>
            <p class="text-center mt-3 mb-0 small text-muted">Already have an account? <a href="login.html" class="fw-bold">Login</a></p>
        </div>
    </div>

    <!-- JS -->
    <script src="js/api.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorAlert = document.getElementById('errorAlert');
            
            try {
                await fetchAPI('/auth/register', 'POST', { name, email, password });
                errorAlert.className = 'alert alert-success';
                errorAlert.textContent = 'Registration successful! Redirecting to login...';
                
                setTimeout(() => window.location.href = 'login.html', 1500);
            } catch (err) {
                errorAlert.className = 'alert alert-danger';
                errorAlert.textContent = err.message;
            }
            errorAlert.classList.remove('d-none');
        });
    </script>
</body>
</html>
