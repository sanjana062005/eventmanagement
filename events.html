<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Events - EventHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="index.html">
                <i class="bi bi-lightning-charge-fill text-warning"></i> EventHub
            </a>
            <div class="collapse navbar-collapse show" id="navMenu">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item"><a class="nav-link px-3 fw-bold" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active px-3 fw-bold" href="events.html">Events</a></li>
                    <li class="nav-item ms-2" id="authBtnContainer"></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5 flex-grow-1">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h2 class="fw-bold mb-0 text-dark">Explore All Events</h2>
        </div>
        <div class="row g-4" id="allEventsContainer">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            const authContainer = document.getElementById('authBtnContainer');
            if(token) {
                authContainer.innerHTML = '<a href="dashboard.html" class="btn btn-outline-light rounded-pill px-4 fw-bold">Dashboard</a>';
            } else {
                authContainer.innerHTML = '<a href="login.html" class="btn btn-primary text-white rounded-pill px-4 fw-bold">Sign In</a>';
            }

            const container = document.getElementById('allEventsContainer');
            const techImages = [
                '1540575467063-178a50c2df87',
                '1492684223066-81342ee5ff30',
                '1515187029135-18ee286d815b',
                '1505373877841-8d25f7d46678',
                '1551818255-e6e10975bc17',
                '1504384308090-c894fdcc538d'
            ];

            try {
                const events = await fetchAPI('/events');
                if (events.length === 0) {
                    container.innerHTML = '<p class="text-center text-muted fw-bold">No events available right now.</p>';
                    return;
                }
                
                let html = '';
                events.forEach((event, index) => {
                    const date = new Date(event.event_date).toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                    const imgHash = techImages[index % techImages.length];
                    const imgSrc = `https://images.unsplash.com/photo-${imgHash}?w=800&q=80`;

                    html += `
                    <div class="col-md-6 col-lg-4">
                        <div class="card h-100 card-event border-0 shadow-sm">
                            <div class="img-wrapper">
                                <span class="badge-overlay"><i class="bi bi-tag-fill text-primary"></i> ${event.id % 2 === 0 ? 'Workshop' : 'Conference'}</span>
                                <img src="${imgSrc}" class="event-img" alt="Event">
                            </div>
                            <div class="card-body p-4 d-flex flex-column">
                                <h5 class="card-title fw-bold flex-grow-1">${event.title}</h5>
                                <div class="mt-3">
                                    <p class="text-muted small mb-2 fw-bold"><i class="bi bi-calendar text-primary me-2"></i> ${date}</p>
                                    <p class="small text-dark fw-bold mb-0"><i class="bi bi-geo-alt text-danger me-2"></i> ${event.location}</p>
                                </div>
                            </div>
                            <div class="card-footer bg-white border-0 pb-4 px-4 pt-0">
                                <a href="event.html?id=${event.id}" class="btn btn-outline-primary w-100 rounded-pill fw-bold">View Details</a>
                            </div>
                        </div>
                    </div>
                    `;
                });
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = '<p class="text-center text-danger fw-bold">Failed to load events.</p>';
            }
        });
    </script>
</body>
</html>
